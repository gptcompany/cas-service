name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - "catalog-info.yaml"
  pull_request:
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - "catalog-info.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: self-hosted / py3.11
    runs-on: [self-hosted, Linux, X64, sam-workstation]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra setup

      - name: Smoke setup CLI help
        run: uv run python -m cas_service.setup.main --help

      - name: Setup wizard tests
        run: uv run pytest -q tests/test_setup_wizard.py

      - name: Full test suite
        run: uv run pytest --cov=cas_service --cov-report=term --cov-report=json

      - name: Extract coverage percentage
        id: cov
        run: |
          COV=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "pct=$COV" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        id: badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cov.outputs.pct
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ac39e6516b7114f96b84ba445b8e7a83
          filename: cas-service-coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 40
          maxColorRange: 90

      - name: Warn if coverage badge update failed
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cov.outputs.pct && steps.badge.outcome == 'failure'
        run: |
          echo "::warning::Coverage badge update failed. Check GIST_TOKEN validity/scope and gist access for ac39e6516b7114f96b84ba445b8e7a83."
